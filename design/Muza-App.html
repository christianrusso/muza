<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Muza — App (preview)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&display=block" rel="stylesheet">
<style>
/* ===== Muza — sistema visual ===== */
:root{
  --coral:#EC5A2E;
  --coral-soft:#FCEEE8;
  --ink:#1A1712;
  --ink-deep:#141210;
  --paper:#F7F5F0;
  --desk:#EDEAE2;
  --card:#FFFFFF;
  --line:#EDE9DF;
  --line-strong:#E7E3D9;
  --muted:#6B655A;
  --faint:#9A9488;
  --green:#2FA36B;
  --amber:#F5A524;
  --red:#E5484D;
  --violet:#5B4FD6;
  --violet-soft:#ECEAFB;
  --green-soft:#E1F1EC;
  --amber-soft:#FBF0DF;
  --pink:#C24C63;
  --pink-soft:#FBE9EC;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--desk);
  font-family:'Manrope',sans-serif;
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  display:flex;
  min-height:100vh;
  align-items:center;
  justify-content:center;
  padding:28px 16px;
}
button{font-family:inherit;cursor:pointer}
.serif{font-family:'Instrument Serif',serif;font-weight:400}
.ital{font-style:italic}
.msym{font-family:'Material Symbols Rounded';font-weight:400;line-height:1;-webkit-font-smoothing:antialiased}

/* ===== Phone shell ===== */
.stage{display:flex;flex-direction:column;align-items:center;gap:16px}
.phone{
  position:relative;width:414px;height:868px;background:var(--ink-deep);
  border-radius:54px;padding:12px;
  box-shadow:0 40px 70px -30px rgba(20,18,16,.55),0 10px 24px -14px rgba(20,18,16,.4);
}
.screen{
  position:relative;width:390px;height:844px;background:var(--paper);
  border-radius:42px;overflow:hidden;
}
.notch{position:absolute;top:24px;left:50%;transform:translateX(-50%);width:120px;height:34px;background:var(--ink-deep);border-radius:20px;z-index:70}

/* status bar */
.statusbar{position:absolute;top:0;left:0;right:0;height:52px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 30px 8px;z-index:60;pointer-events:none;color:var(--ink)}
.statusbar.light{color:#fff}
.statusbar .time{font-weight:700;font-size:15px}
.statusbar .icons{display:flex;align-items:center;gap:7px}
.bars{display:flex;align-items:flex-end;gap:2px;height:11px}
.bars span{width:3px;background:currentColor;border-radius:1px;opacity:.9}
.bars span:nth-child(1){height:5px}.bars span:nth-child(2){height:7px}.bars span:nth-child(3){height:9px}.bars span:nth-child(4){height:11px}
.batt{width:16px;height:11px;border:1.6px solid currentColor;border-radius:3px;position:relative;opacity:.9}
.batt::after{content:"";position:absolute;top:2px;left:1.5px;bottom:2px;width:9px;background:currentColor;border-radius:1px}
.home-ind{position:absolute;bottom:9px;left:50%;transform:translateX(-50%);width:134px;height:5px;border-radius:3px;background:var(--ink);opacity:.5;z-index:60;pointer-events:none}
.home-ind.light{background:#fff}

/* app viewport (screens injected here) */
#app{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
#app::-webkit-scrollbar{width:0}
.screen-body{min-height:100%;position:relative}
.screen-body.pad{padding:62px 22px 30px;display:flex;flex-direction:column}
.screen-body.pad-tab{padding:62px 22px 100px;display:flex;flex-direction:column}

/* screen transition */
.fade-enter{animation:fadeUp .32s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes muzaspin{to{transform:rotate(360deg)}}

/* ===== components ===== */
.btn{height:54px;border-radius:16px;border:none;font-weight:700;font-size:16px;display:flex;align-items:center;justify-content:center;gap:9px;width:100%;transition:transform .12s,filter .12s}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--coral);color:#fff;box-shadow:0 14px 26px -14px rgba(236,90,46,.6)}
.btn-primary:disabled{background:#E3DED3;color:#B4AE9F;box-shadow:none;cursor:default}
.btn-outline{background:#fff;border:1.5px solid var(--line-strong);color:var(--ink)}
.btn-ghost{background:rgba(255,255,255,.14);color:#fff;border:1.5px solid rgba(255,255,255,.4);backdrop-filter:blur(6px)}
.btn-light{background:var(--paper);color:var(--ink)}
.btn-icon{width:52px;height:52px;border-radius:16px;border:1.5px solid var(--line-strong);background:#fff;color:var(--ink);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.btn-icon .msym{font-size:20px}

.back{width:40px;height:40px;border-radius:12px;border:1.5px solid var(--line-strong);background:#fff;display:flex;align-items:center;justify-content:center;color:var(--ink);flex:0 0 auto}
.back .msym{font-size:22px}
.screen-head{display:flex;align-items:center;gap:14px;margin-bottom:22px}
.screen-head .serif{font-size:27px}

.field{display:flex;flex-direction:column;gap:7px}
.field label{font-weight:600;font-size:12px;color:var(--muted)}
.input{height:52px;border:1.5px solid var(--line-strong);background:#fff;border-radius:14px;padding:0 16px;font:600 15px 'Manrope';color:var(--ink);width:100%;outline:none}
.input::placeholder{color:#B4AE9F;font-weight:600}
.input:focus{border-color:var(--coral)}
.input.ok{border-color:var(--green)}
.input.err{border-color:var(--red)}

.badge{display:inline-flex;align-items:center;gap:6px;height:26px;padding:0 11px;border-radius:8px;font-weight:700;font-size:11px;white-space:nowrap}
.badge .dot{width:6px;height:6px;border-radius:50%}
.badge--full{background:var(--violet-soft);color:var(--violet)}.badge--full .dot{background:var(--violet)}
.badge--top{background:var(--green-soft);color:var(--green)}.badge--top .dot{background:var(--green)}
.badge--bottom{background:var(--amber-soft);color:#B67816}.badge--bottom .dot{background:#B67816}
.badge--single{background:var(--pink-soft);color:var(--pink)}.badge--single .dot{background:var(--pink)}

.card{background:var(--card);border:1px solid var(--line);border-radius:20px}

/* score ring */
.ring{position:relative;border-radius:50%;flex:0 0 auto;background:conic-gradient(var(--c,#2FA36B) calc(var(--p,.8)*1turn), #EAE6DC 0)}
.ring .inner{position:absolute;border-radius:50%;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring .val{font-weight:800;color:var(--ink);line-height:1}
.ring .max{font-weight:700;color:var(--faint);letter-spacing:.12em}

/* chips */
.chip{flex:0 0 auto;height:32px;padding:0 15px;border-radius:18px;background:#fff;border:1.5px solid var(--line-strong);color:var(--muted);font-weight:700;font-size:12px;display:flex;align-items:center;gap:6px}
.chip.active{background:var(--coral);border-color:var(--coral);color:#fff}
.chip .dot{width:6px;height:6px;border-radius:50%}

/* tab bar */
.tabbar{position:absolute;left:0;right:0;bottom:0;height:86px;background:rgba(247,245,240,.94);backdrop-filter:blur(12px);border-top:1px solid var(--line-strong);display:flex;align-items:flex-start;justify-content:space-around;padding:12px 18px 0;z-index:55}
.tabbar.hidden{display:none}
.tab{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--faint);background:none;border:none;padding:0}
.tab .msym{font-size:26px}
.tab .lbl{font-size:10px;font-weight:600}
.tab.active{color:var(--coral)}
.tab.active .lbl{font-weight:700}

.list-card{background:#fff;border:1px solid var(--line);border-radius:18px;overflow:hidden}
.row{display:flex;align-items:center;gap:12px;padding:15px 16px}
.row + .row{border-top:1px solid var(--line)}
.row .msym{font-size:21px;color:var(--muted)}
.row .txt{flex:1;font-weight:700;font-size:14px;color:var(--ink)}
.row .chev{font-size:20px;color:#C7C0B2}
.row .meta{font-weight:700;font-size:13px;color:var(--faint)}

.toggle{width:44px;height:26px;border-radius:14px;background:#D3CDBF;position:relative;flex:0 0 auto;transition:background .2s}
.toggle.on{background:var(--coral)}
.toggle::after{content:"";position:absolute;top:2px;left:2px;width:22px;height:22px;border-radius:50%;background:#fff;transition:left .2s}
.toggle.on::after{left:20px}

.section-label{font-weight:700;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint)}

/* placeholder photo texture */
.ph{background:repeating-linear-gradient(48deg,#D6D1C4 0 14px,#DCD7CA 14px 28px)}
.ph-2{background:repeating-linear-gradient(48deg,#CFC9BB 0 14px,#D5CFC1 14px 28px)}
.ph-3{background:repeating-linear-gradient(48deg,#D2CCBE 0 14px,#D8D2C4 14px 28px)}
.ph-dark{background:repeating-linear-gradient(48deg,#4A443C 0 15px,#524B42 15px 30px)}
.ph-cap{display:flex;align-items:center;justify-content:center;color:#A39C8D;font:500 10px 'Manrope';letter-spacing:.14em;text-transform:uppercase}

/* logo mark */
.mark{border-radius:50%;background:conic-gradient(from -55deg,var(--coral) 0turn .72turn,#D8D2C4 .72turn 1turn);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.mark .hole{border-radius:50%;background:var(--paper);display:flex;align-items:center;justify-content:center}
.mark .hole .m{font-family:'Instrument Serif',serif;font-style:italic;color:var(--ink-deep)}

.fab{position:absolute;right:20px;bottom:100px;height:50px;padding:0 20px;border-radius:26px;border:none;background:var(--coral);color:#fff;font-weight:800;font-size:14px;display:flex;align-items:center;gap:8px;box-shadow:0 12px 24px -8px rgba(236,90,46,.7);z-index:56}
.fab .msym{font-size:22px}

.bottom-cta{position:sticky;bottom:0;left:0;right:0;padding:12px 22px 26px;background:linear-gradient(to top,var(--paper) 72%,rgba(247,245,240,0));display:flex;flex-direction:column;gap:10px;z-index:40}

.spinner{border-radius:50%;border:5px solid rgba(255,255,255,.2);border-top-color:var(--coral);animation:muzaspin 1s linear infinite}

</style>
</head>

  <script>window.__SCREENS = {"welcome":"<div class=\"screen-body\" data-statusbar=\"light\">\n  <div style=\"position:absolute;inset:0\" class=\"ph-dark\"></div>\n  <div style=\"position:absolute;inset:0;background:linear-gradient(to bottom,rgba(20,18,16,.15) 0%,rgba(20,18,16,0) 34%,rgba(20,18,16,.22) 54%,rgba(20,18,16,.88) 88%)\"></div>\n  <div style=\"position:absolute;top:120px;left:0;right:0\" class=\"ph-cap\"><span data-i18n>foto de outfit</span></div>\n  <div style=\"position:absolute;left:0;right:0;bottom:0;padding:0 28px 40px;display:flex;flex-direction:column;align-items:center\">\n    <div class=\"mark\" style=\"width:58px;height:58px;background:rgba(20,18,16,.4);backdrop-filter:blur(6px);margin-bottom:10px\">\n      <div class=\"mark\" style=\"width:46px;height:46px;background:conic-gradient(from -55deg,var(--coral) 0turn .72turn,rgba(247,245,240,.45) .72turn 1turn)\"><div class=\"hole\" style=\"width:35px;height:35px;background:var(--ink-deep)\"><span class=\"m\" style=\"font-size:20px;color:var(--paper)\">M</span></div></div>\n    </div>\n    <span class=\"serif ital\" style=\"font-size:62px;color:var(--paper);line-height:1\">Muza</span>\n    <span data-i18n style=\"font-weight:600;font-size:15px;color:rgba(247,245,240,.85);margin-bottom:26px\">Tu outfit, evaluado</span>\n    <button class=\"btn btn-light\" data-nav=\"home\"><span style=\"width:20px;height:20px;border-radius:5px;background:var(--coral);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px\">G</span><span data-i18n>Continuar con Google</span></button>\n    <button class=\"btn btn-ghost\" style=\"margin-top:11px\" data-nav=\"home\"><span style=\"width:20px;height:20px;border-radius:5px;background:var(--paper);color:var(--ink);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px\">A</span><span data-i18n>Continuar con Apple</span></button>\n    <button class=\"btn btn-primary\" style=\"margin-top:11px\" data-nav=\ ont-size:13px\" data-i18n>Un número</span></div>\n      <div class=\"ck\" data-check=\"special\" style=\"display:flex;align-items:center;gap:9px;color:var(--faint)\"><span class=\"ci msym\" style=\"font-size:18px;color:#CFC9BB\">radio_button_unchecked</span><span style=\"font-weight:600;font-size:13px\" data-i18n>Un carácter especial</span></div>\n    </div>\n    <div class=\"field\"><label data-i18n>Repetir contraseña</label><input id=\"pw2\" class=\"input\" type=\"password\" placeholder=\"••••••••••\"></div>\n    <div class=\"ck\" data-check=\"match\" style=\"display:flex;align-items:center;gap:9px;color:var(--faint);padding:0 2px\"><span class=\"ci msym\" style=\"font-size:18px;color:#CFC9BB\">radio_button_unchecked</span><span style=\"font-weight:600;font-size:13px\" data-i18n>Las contraseñas coinciden</span></div>\n  </div>\n  <button id=\"cta\" class=\"btn btn-primary\" style=\"margin-top:24px\" data-nav=\"home\"><span data-i18n>Crear cuenta</span></button>\n</div>\n","login":"<div class=\"screen-body pad\" data-statusbar=\"dark\">\n  <div class=\"screen-head\">\n    <button class=\"back\" data-nav=\"welcome\"><span class=\"msym\">chevron_left</span></button>\n    <span class=\"serif\" data-i18n>Iniciar sesión</span>\n  </div>\n  <span class=\"serif ital\" style=\"font-size:44px;line-height:1;margin:6px 0 30px\" data-i18n>Hola de nuevo.</span>\n  <div style=\"display:flex;flex-direction:column;gap:16px\">\n    <div class=\"field\"><label data-i18n>Email</label><input class=\"input\" type=\"email\" placeholder=\"paula@email.com\"></div>\n    <div class=\"field\"><label data-i18n>Contraseña</label><input class=\"input\" type=\"password\" placeholder=\"••••••••••\"></div>\n    <b data-nav=\"forgot\" style=\"align-self:flex-end;font-weight:700;font-size:13px;color:var(--coral);text-decoration:underline\" data-i18n>Olvidé mi contraseña</b>\n  </div>\n  <button class=\"btn btn-primary\" style=\"margin-top:28px\" data-nav=\"home\"><span data-i18n>Ingresar</span></but   <script>

    "Miércoles 1 de julio":"Wednesday, July 1","Hola,":"Hi,",

    "¿Para qué ocasión?":"What's the occasion?","Elegí una para un análisis más preciso":"Pick one for a more accurate analysis",

    "Outfit Score":"Outfit Score","Cita nocturna · Elegante":"Night date · Elegant","Buen look":"Great look",

    "Calzado":"Footwear","Proporciones":"Proportions","Accesorios":"Accessories","Estado de las prendas":"Garment condition","Modernidad":"Modernity","Originalidad":"Originality",
    "Perfecta para una cita nocturna; formalidad justa.":"Perfect for a night date; just the right formality.",

    "Cambiá a zapatos marrones":"Switch to brown shoes","Combinan mejor con la paleta cálida.":"They pair better with the warm palette.",

    "Cinturón de cuero":"Leather belt","Zapatos marrones":"Brown shoes",

    // history
    "Todos":"All","Ocasión":"Occasion","Hoy":"Today","Ayer":"Yesterday",

    "Popular":"Popular","Reciente":"Recent","Siguiendo":"Following",
    "hace 2 h":"2 h ago","hace 5 h":"5 h ago","Publicar":"Post",

    "Plan Gratis":"Free plan","Promedio":"Average","Publicaciones":"Posts","Tus publicaciones":"Your posts",
    "Editar nombre":"Edit name","Configuración":"Settings",
    // settings
    "Muza Pro":"Muza Pro","Simulaciones ilimitadas y análisis avanzado":"Unlimited simulations and advanced analysis","Mejorar plan":"Upgrade",
    "Cuenta":"Account","Editar email":"Edit email","Preferencias":"Preferences","Idioma":"Language","Español":"Spanish","English":"English",
    "Notificaciones":"Notifications","Sesión":"Session","Cerrar sesión":"Log out","Eliminar cuenta":"Delete account"
  };

  function applyLang(scope) {
    var nodes = scope.querySelectorAll('[data-i18n]');
    for (var i = 0; i < nodes.length; i++) {
      var el = nodes[i];
      if (el.dataset.es === undefined) el.dataset.es = el.textContent.trim();
      if (lang === 'en') {
        var en = dict[el.dataset.es];
        el.textContent = (en != null) ? en : el.dataset.es;
      } else {
        el.textContent = el.dataset.es;
      }
    }
  }
  function setLang(l) { lang = l; applyLang(document.body); }
  function toggleLang() { setLang(lang === 'es' ? 'en' : 'es'); }

  /* ---------- chrome ---------- */
  function setChrome(root) {
    var sb = root.getAttribute('data-statusbar') || 'dark';
    statusbar.classList.toggle('light', sb === 'light');
    homeind.classList.toggle('light', sb === 'light');

    var tab = root.getAttribute('data-tab');
    if (tab) {
      tabbar.classList.remove('hidden');
      var tabs = tabbar.querySelectorAll('.tab');
      for (var i = 0; i < tabs.length; i++) {
        tabs[i].classList.toggle('active', tabs[i].getAttribute('data-tab-to') === tab);
      }
    } else {
      tabbar.classList.add('hidden');
    }
  }

  /* ---------- router ---------- */
  var current = null;
  var timer = null;

  function navigate(name) {
    if (timer) { clearTimeout(timer); timer = null; }
    Promise.resolve(window.__SCREENS[name] || '')
      .then(function (html) {
        app.innerHTML = html;
        app.scrollTop = 0;
        var root = app.querySelector('.screen-body');
        if (!root) return;
        root.classList.add('fade-enter');
        current = name;
        setChrome(root);
        applyLang(app);
        wire(name, root);
        var auto = root.getAttribute('data-auto');
        if (auto) {
          var parts = auto.split(':');
          timer = setTimeout(function () { navigate(parts[0]); }, parseInt(parts[1], 10) || 1500);
        }
      });
  }

  /* ---------- global delegation ---------- */
  document.addEventListener('click', function (e) {
    var nav = e.target.closest ? e.target.closest('[data-nav]') : null;
    if (nav) { navigate(nav.getAttribute('data-nav')); return; }
    var tabTo = e.target.closest ? e.target.closest('[data-tab-to]') : null;
    if (tabTo) { navigate(tabTo.getAttribute('data-tab-to')); return; }
  });

  /* ---------- per-screen wiring ---------- */
  function wire(name, root) {
    var fn = wiring[name];
    if (fn) fn(root);
  }

  var wiring = {
    register: function (root) {
      var pw = root.querySelector('#pw');
      var pw2 = root.querySelector('#pw2');
      var email = root.querySelector('#email');
      var name = root.querySelector('#name');
      var cta = root.querySelector('#cta');
      var checks = {
        len: root.querySelector('[data-check="len"]'),
        case: root.querySelector('[data-check="case"]'),
        num: root.querySelector('[data-check="num"]'),
        special: root.querySelector('[data-check="special"]'),
        match: root.querySelector('[data-check="match"]')
      };
      function mark(el, ok) {
        if (!el) return;
        var ic = el.querySelector('.ci');
        el.style.color = ok ? 'var(--ink)' : 'var(--faint)';
        if (ic) {
          ic.className = 'ci msym';
          ic.textContent = ok ? 'check_circle' : 'radio_button_unchecked';
          ic.style.color = ok ? 'var(--green)' : '#CFC9BB';
        }
      }
      function validate() {
        var p = pw.value, p2 = pw2.value;
        var r = {
          len: p.length >= 8,
          case: /[a-z]/.test(p) && /[A-Z]/.test(p),
          num: /[0-9]/.test(p),
          special: /[^A-Za-z0-9]/.test(p),
          match: p.length > 0 && p === p2
        };
        for (var k in r) mark(checks[k], r[k]);
        var emailOk = /^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email.value);
        email.classList.toggle('ok', emailOk && email.value.length > 0);
        cta.disabled = false; // gating disabled — click through freely
      }
      [pw, pw2, email, name].forEach(function (el) { if (el) el.addEventListener('input', validate); });
      validate();
    },

    forgot: function (root) {
      var boxes = root.querySelectorAll('.code-box');
      boxes.forEach(function (b, i) {
        b.addEventListener('input', function () {
          b.value = b.value.replace(/[^0-9]/g, '').slice(0, 1);
          if (b.value && boxes[i + 1]) boxes[i + 1].focus();
        });
        b.addEventListener('keydown', function (e) {
          if (e.key === 'Backspace' && !b.value && boxes[i - 1]) boxes[i - 1].focus();
        });
      });
      if (boxes[0]) boxes[0].focus();
    },

    occasion: function (root) {
      var cta = root.querySelector('#cta');
      root.querySelectorAll('[data-occasion]').forEach(function (c) {
        c.addEventListener('click', function () {
          root.querySelectorAll('[data-occasion]').forEach(function (x) { x.classList.remove('sel'); });
          c.classList.add('sel');
          if (cta) cta.disabled = false;
        });
      });
    },

    result: function (root) {
      root.querySelectorAll('[data-rec]').forEach(function (r) {
        r.addEventListener('click', function () {
          r.classList.toggle('on');
          var box = r.querySelector('.rec-box');
          var on = r.classList.contains('on');
          box.innerHTML = on ? '<span class="msym" style="font-size:18px;color:#fff">check</span>' : '';
          box.style.background = on ? 'var(--coral)' : '#fff';
          box.style.borderColor = on ? 'var(--coral)' : '#D3CDBF';
          r.style.borderColor = on ? 'var(--coral)' : 'var(--line-strong)';
          r.style.background = on ? 'var(--coral-soft)' : '#fff';
        });
      });
      root.querySelectorAll('[data-expand]').forEach(function (c) {
        c.addEventListener('click', function () {
          var p = c.querySelector('.just');
          if (p) p.style.display = (p.style.display === 'block') ? 'none' : 'block';
        });
      });
    },

    'simulate-result': function (root) {
      var wrap = root.querySelector('#compare');
      if (!wrap) return;
      var top = root.querySelector('#after-layer');
      var handle = root.querySelector('#handle');
      function setP(clientX) {
        var rect = wrap.getBoundingClientRect();
        var p = (clientX - rect.left) / rect.width;
        p = Math.max(0.05, Math.min(0.95, p));
        top.style.width = (p * 100) + '%';
        handle.style.left = (p * 100) + '%';
      }
      var dragging = false;
      function down(e) { dragging = true; move(e); }
      function move(e) { if (!dragging) return; var x = e.touches ? e.touches[0].clientX : e.clientX; setP(x); e.preventDefault(); }
      function up() { dragging = false; }
      handle.addEventListener('mousedown', down);
      wrap.addEventListener('mousedown', down);
      window.addEventListener('mousemove', move);
      window.addEventListener('mouseup', up);
      handle.addEventListener('touchstart', down, { passive: false });
      wrap.addEventListener('touchstart', down, { passive: false });
      window.addEventListener('touchmove', move, { passive: false });
      window.addEventListener('touchend', up);
    },

    history: function (root) {
      root.querySelectorAll('.filter-chip').forEach(function (c) {
        c.addEventListener('click', function () {
          root.querySelectorAll('.filter-chip').forEach(function (x) { x.classList.remove('active'); });
          c.classList.add('active');
        });
      });
    },

    community: function (root) {
      root.querySelectorAll('[data-like]').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var on = btn.classList.toggle('liked');
          var ic = btn.querySelector('.msym');
          var cnt = btn.querySelector('.cnt');
          ic.textContent = on ? 'favorite' : 'favorite_border';
          btn.style.color = on ? 'var(--coral)' : 'var(--muted)';
          var n = parseInt(cnt.getAttribute('data-n'), 10);
          var v = on ? n + 1 : n;
          cnt.textContent = v;
        });
      });
      root.querySelectorAll('.feed-tab').forEach(function (t) {
        t.addEventListener('click', function () {
          root.querySelectorAll('.feed-tab').forEach(function (x) { x.classList.remove('active'); });
          t.classList.add('active');
        });
      });
    },

    settings: function (root) {
      var langRow = root.querySelector('#lang-row');
      var langVal = root.querySelector('#lang-val');
      function paintLangVal() { if (langVal) langVal.textContent = (lang === 'en') ? 'English' : 'Español'; }
      paintLangVal();
      if (langRow) {
        langRow.addEventListener('click', function () {
          toggleLang();
          paintLangVal();
        });
      }
      root.querySelectorAll('.toggle').forEach(function (t) {
        t.addEventListener('click', function () { t.classList.toggle('on'); });
      });
    }
  };

  /* toast helper for "save" actions */
  window.muzaToast = function (msg) {
    var t = document.createElement('div');
    t.textContent = msg;
    t.style.cssText = 'position:absolute;left:50%;bottom:120px;transform:translateX(-50%);background:var(--ink-deep);color:#fff;font:700 13px Manrope;padding:12px 20px;border-radius:14px;z-index:80;opacity:0;transition:opacity .2s;white-space:nowrap';
    document.querySelector('.screen').appendChild(t);
    requestAnimationFrame(function () { t.style.opacity = '1'; });
    setTimeout(function () { t.style.opacity = '0'; setTimeout(function () { t.remove(); }, 250); }, 1400);
  };

  document.addEventListener('click', function (e) {
    var save = e.target.closest ? e.target.closest('[data-toast]') : null;
    if (save) window.muzaToast(lang === 'en' ? (dict[save.getAttribute('data-toast')] || save.getAttribute('data-toast')) : save.getAttribute('data-toast'));
  });

  /* boot */
  window.muzaGo = navigate;
  navigate('welcome');
})();

  </script>
</body>
</html>
